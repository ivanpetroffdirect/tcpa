<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Калькулятор цены за достижение цели в Яндекс Директе</title>
  <style>
    :root {
      --primary: #4f46e5;
      --bg: #f8fafc;
      --card-bg: #ffffff;
      --text: #1e293b;
      --text-light: #64748b;
      --border: #e2e8f0;
      --success: #10b981;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.5;
      padding: 1rem 0.5rem;
      margin: 0;
    }

    @media (min-width: 640px) {
      body {
        padding: 2rem 1rem;
      }
    }

    .calc-container {
      max-width: 800px;
      margin: 0 auto;
      background: var(--card-bg);
      padding: 1.25rem;
      border-radius: 16px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
      box-sizing: border-box;
    }

    @media (min-width: 640px) {
      .calc-container {
        padding: 2.5rem;
      }
    }

    h1 {
      font-size: 1.35rem;
      font-weight: 700;
      margin-top: 0;
      margin-bottom: 0.75rem;
      text-align: center;
      color: #0f172a;
      line-height: 1.3;
      text-wrap: balance;
    }

    @media (min-width: 640px) {
      h1 {
        font-size: 1.6rem;
      }
    }

    .descriptor {
      font-size: 0.9rem;
      color: var(--text-light);
      text-align: left;
      margin: 0 0 1.75rem 0;
      line-height: 1.45;
    }

    @media (min-width: 640px) {
      .descriptor {
        margin-bottom: 2.25rem;
      }
    }

    .help-link {
      color: var(--primary);
      border-bottom: 1px dashed var(--primary);
      cursor: pointer;
      font-weight: 600;
      transition: opacity 0.2s;
    }

    .help-link:hover {
      opacity: 0.8;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.25rem;
    }

    @media (min-width: 640px) {
      .grid {
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
      }
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .label-wrapper {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    label {
      font-size: 0.9rem;
      font-weight: 600;
    }

    .help-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      background: #e2e8f0;
      color: #64748b;
      border-radius: 50%;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      user-select: none;
      transition: all 0.2s;
    }

    @media (min-width: 640px) {
      .help-btn {
        width: 16px;
        height: 16px;
        font-size: 11px;
      }
    }

    .help-btn:hover {
      background: var(--primary);
      color: #fff;
    }

    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }

    input {
      width: 100%;
      padding: 0.85rem 2.5rem 0.85rem 0.75rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 1rem;
      box-sizing: border-box;
      -webkit-appearance: none;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
    }

    input[readonly] {
      background-color: #f1f5f9;
      color: var(--text-light);
      cursor: not-allowed;
    }

    .unit {
      position: absolute;
      right: 0.75rem;
      color: var(--text-light);
      font-size: 0.9rem;
      pointer-events: none;
    }

    .results-section {
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 2px dashed var(--border);
    }

    @media (min-width: 640px) {
      .results-section {
        margin-top: 2.5rem;
        padding-top: 2rem;
      }
    }

    /* Изменено под двухколоночный grid для вывода меток бок о бок */
    .results-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.25rem;
    }

    @media (min-width: 640px) {
      .results-grid {
        grid-template-columns: 1fr 1fr;
        gap: 1.5rem;
      }
    }

    .result-card {
      background: rgba(79, 70, 229, 0.04);
      border: 1px solid rgba(79, 70, 229, 0.2);
      padding: 1.25rem;
      border-radius: 14px;
      text-align: center;
      box-sizing: border-box;
    }

    @media (min-width: 640px) {
      .result-card {
        padding: 1.75rem;
      }
    }

    .result-label {
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-light);
      margin-bottom: 0.5rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
    }

    .result-value {
      display: inline-block;
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--success);
      word-break: break-word;
      cursor: pointer;
      position: relative;
      transition: color 0.2s, transform 0.1s;
      user-select: none;
    }

    @media (min-width: 640px) {
      .result-value {
        font-size: 2.25rem;
      }
    }

    .result-value:hover {
      color: #059669;
    }

    .result-value:active {
      transform: scale(0.97);
    }

    .result-value::after {
      content: attr(data-tooltip);
      position: absolute;
      bottom: 125%;
      left: 50%;
      transform: translateX(-50%) scale(0.9);
      background-color: #1e293b;
      color: #ffffff;
      padding: 5px 10px;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
